name: pokebot

on:
  schedule:
    # cron は UTC 基準 (env.TZ の影響を受けない)。毎時の分指定なので
    # JST でも同じ間隔 = 1 時間で安定発火する。
    # 2026-04-26 GitHub Actions 月次usage削減のため両 lane を 1 時間おきに変更
    # (旧: Full 0,30 / Fast 15,45 → 月実行 2880 回。約 716 分消費)。
    # 新: 月実行 1440 回 (-50%)、約 358 分予測。
    # Full lane (全 adapter): UTC 0 分。1 時間間隔で network 全量スキャン。
    - cron: "0 * * * *"
    # Fast lane (公式 + 主要販路 entry_page のみ): UTC 30 分。
    # Full との 30 分オフセットで速報性を維持 (LINE通知の最大遅延 30 分)。
    - cron: "30 * * * *"
  workflow_dispatch:
    inputs:
      job:
        description: "実行するjob"
        type: choice
        default: all
        options:
          - all
          - fast
          - product-sync
          - lottery-watch
          - lottery-watch-fast
          - notify-dispatch
          - bootstrap
          - audit
          - archive-stale-events
      dry_run:
        description: "DRY_RUN (LINE送信をログに置換)"
        type: boolean
        default: true
      max_per_run:
        description: "1回の実行で送る最大通知数"
        type: string
        default: "2"
      cleanup_execute:
        description: "archive-stale-events job で実際にUPDATEする (false=dry-run)"
        type: boolean
        default: false
      skip_product_cooldown:
        description: "PRODUCT_NEW_COOLDOWN (同商品 72h) を一時的に無効化 (緊急救済用)"
        type: boolean
        default: false

# Fast と Full は DB 側の ON CONFLICT / dedupe で安全に並列可能だが、
# 同じ SELECT → INSERT を同時に走らせると UNIQUE 競合で片側失敗するため、
# group を分けずに queue 実行する (cancel-in-progress=false)。
concurrency:
  group: pokebot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    # Full lane: 21 adapter + body fetch で 6〜8 分。Fast lane: 7 adapter で 3 分程度。
    # 余裕を持って 12 分。
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e .
      - name: Determine job
        id: job
        # schedule 実行時は github.event.schedule で cron 式を判定。
        # - "0 * * * *"  → all  (Full lane)
        # - "30 * * * *" → fast (Fast lane)
        # workflow_dispatch 時は inputs.job を使う。
        run: |
          if [ -n "${{ inputs.job }}" ]; then
            echo "name=${{ inputs.job }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "30 * * * *" ]; then
            echo "name=fast" >> "$GITHUB_OUTPUT"
          else
            echo "name=all" >> "$GITHUB_OUTPUT"
          fi
      - name: Run pokebot
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # JP リージョン proxy (fetch-jp edge function)。両方セットされたときのみ
          # PROXY_HOSTS 対象 URL が proxy 経由で fetch される。未設定時は直接 fetch。
          SUPABASE_FETCH_JP_URL: ${{ secrets.SUPABASE_FETCH_JP_URL }}
          SUPABASE_FETCH_JP_KEY: ${{ secrets.SUPABASE_FETCH_JP_KEY }}
          LOG_LEVEL: INFO
          # GHA runner は UTC だが、datetime.now() を JST 基準で扱いたい
          # (daily_summary DAILY_REPORT_JST="09:00" を JST 09:00 窓で発火するため)。
          # TZ を設定すれば Python datetime.now() が JST で返る。
          TZ: Asia/Tokyo
          # schedule 実行時は inputs が存在せず真偽値扱いで false → '0' (実送信)。
          # workflow_dispatch 時はユーザー選択 (デフォルト true → '1' で DRY_RUN)。
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
          MAX_NOTIFY_PER_RUN: ${{ inputs.max_per_run || '2' }}
          # LINE 無料枠 200/月 ≒ 6.7/日 の安全圏として 6 に制限。
          MAX_NOTIFY_PER_DAY: "6"
          # 手動 dispatch で skip_product_cooldown=true の時のみ同商品 72h 抑制を無効化。
          # schedule 実行時は inputs 未定義 → false → '0' (通常動作)。
          SKIP_PRODUCT_COOLDOWN: ${{ inputs.skip_product_cooldown && '1' || '0' }}
          # archive-stale-events job 用: true の時だけ実際に UPDATE、
          # それ以外は dry-run (件数とサンプル print のみ、DB 変更なし)。
          # 他 job には影響しない (env が未使用なので無視される)。
          CLEANUP_EXECUTE: ${{ inputs.cleanup_execute && '1' || '0' }}
        run: python -m pokebot ${{ steps.job.outputs.name }}
