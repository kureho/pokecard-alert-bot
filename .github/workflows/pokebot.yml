name: pokebot

on:
  # schedule は有効化前に段階検証完了必須
  # schedule:
  #   - cron: "*/30 * * * *"  # Phase 1 は30分間隔で開始（量を見て再調整）
  workflow_dispatch:
    inputs:
      job:
        description: "実行するjob"
        type: choice
        default: all
        options:
          - all
          - product-sync
          - lottery-watch
          - notify-dispatch
          - bootstrap
      dry_run:
        description: "DRY_RUN (LINE送信をログに置換)"
        type: boolean
        default: true
      max_per_run:
        description: "1回の実行で送る最大通知数"
        type: string
        default: "5"

concurrency:
  group: pokebot
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e .
      - name: Run pokebot
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LOG_LEVEL: INFO
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
          MAX_NOTIFY_PER_RUN: ${{ inputs.max_per_run }}
          MAX_NOTIFY_PER_DAY: "150"
        run: python -m pokebot ${{ inputs.job || 'all' }}
