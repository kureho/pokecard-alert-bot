name: pokebot

on:
  schedule:
    # 30分間隔。LINE 無料枠 200通/月 ≒ 6.7通/日 を超過しない cap と合わせて運用。
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      job:
        description: "実行するjob"
        type: choice
        default: all
        options:
          - all
          - product-sync
          - lottery-watch
          - notify-dispatch
          - bootstrap
          - audit
      dry_run:
        description: "DRY_RUN (LINE送信をログに置換)"
        type: boolean
        default: true
      max_per_run:
        description: "1回の実行で送る最大通知数"
        type: string
        default: "2"

concurrency:
  group: pokebot
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e .
      - name: Run pokebot
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LOG_LEVEL: INFO
          # schedule 実行時は inputs が存在せず真偽値扱いで false → '0' (実送信)。
          # workflow_dispatch 時はユーザー選択 (デフォルト true → '1' で DRY_RUN)。
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
          MAX_NOTIFY_PER_RUN: ${{ inputs.max_per_run || '2' }}
          # LINE 無料枠 200/月 ≒ 6.7/日 の安全圏として 6 に制限。
          MAX_NOTIFY_PER_DAY: "6"
        run: python -m pokebot ${{ inputs.job || 'all' }}
