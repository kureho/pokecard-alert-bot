name: pokebot

on:
  schedule:
    # cron は UTC 基準 (env.TZ の影響を受けない)。毎時の分指定なので
    # JST でも同じ間隔 = 30 分 / 15 分で安定発火する。
    # Full lane (全 adapter): UTC 0,30 分。30 分間隔で network 全量スキャン。
    - cron: "0,30 * * * *"
    # Fast lane (公式 + 主要販路 entry_page のみ): UTC 15,45 分。速報性重視。
    - cron: "15,45 * * * *"
  workflow_dispatch:
    inputs:
      job:
        description: "実行するjob"
        type: choice
        default: all
        options:
          - all
          - fast
          - product-sync
          - lottery-watch
          - lottery-watch-fast
          - notify-dispatch
          - bootstrap
          - audit
          - archive-non-tokyo-metro
      dry_run:
        description: "DRY_RUN (LINE送信をログに置換)"
        type: boolean
        default: true
      max_per_run:
        description: "1回の実行で送る最大通知数"
        type: string
        default: "2"
      cleanup_execute:
        description: "archive-non-tokyo-metro job で実際にUPDATEする (false=dry-run)"
        type: boolean
        default: false

# Fast と Full は DB 側の ON CONFLICT / dedupe で安全に並列可能だが、
# 同じ SELECT → INSERT を同時に走らせると UNIQUE 競合で片側失敗するため、
# group を分けずに queue 実行する (cancel-in-progress=false)。
concurrency:
  group: pokebot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    # Full lane: 21 adapter + body fetch で 6〜8 分。Fast lane: 7 adapter で 3 分程度。
    # 余裕を持って 12 分。
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e .
      - name: Determine job
        id: job
        # schedule 実行時は github.event.schedule で cron 式を判定。
        # - "0,30 * * * *" → all (Full lane)
        # - "15,45 * * * *" → fast (Fast lane)
        # workflow_dispatch 時は inputs.job を使う。
        run: |
          if [ -n "${{ inputs.job }}" ]; then
            echo "name=${{ inputs.job }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "15,45 * * * *" ]; then
            echo "name=fast" >> "$GITHUB_OUTPUT"
          else
            echo "name=all" >> "$GITHUB_OUTPUT"
          fi
      - name: Run pokebot
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LOG_LEVEL: INFO
          # GHA runner は UTC だが、datetime.now() を JST 基準で扱いたい
          # (daily_summary DAILY_REPORT_JST="09:00" を JST 09:00 窓で発火するため)。
          # TZ を設定すれば Python datetime.now() が JST で返る。
          TZ: Asia/Tokyo
          # schedule 実行時は inputs が存在せず真偽値扱いで false → '0' (実送信)。
          # workflow_dispatch 時はユーザー選択 (デフォルト true → '1' で DRY_RUN)。
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
          MAX_NOTIFY_PER_RUN: ${{ inputs.max_per_run || '2' }}
          # LINE 無料枠 200/月 ≒ 6.7/日 の安全圏として 6 に制限。
          MAX_NOTIFY_PER_DAY: "6"
          # archive-non-tokyo-metro job 用: true の時だけ実際に UPDATE、
          # それ以外は dry-run (件数とサンプル print のみ、DB 変更なし)。
          # 他 job には影響しない (env が未使用なので無視される)。
          CLEANUP_EXECUTE: ${{ inputs.cleanup_execute && '1' || '0' }}
        run: python -m pokebot ${{ steps.job.outputs.name }}
