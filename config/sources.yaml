sources:
  - id: yodobashi_lottery
    kind: html
    # 2026-04-20: UA/IP ベースの 403 Forbidden。Phase 2 で Playwright 経由に変更予定。
    url: https://www.yodobashi.com/ec/special/other/54666/
    interval_sec: 120
    parser: yodobashi.lottery_list
    enabled: false
  - id: pokemon_card_news
    kind: html
    # 2026-04-20: 一般ニュース（大会告知/イベント）が多く BOX 抽選情報に直結しない。
    # Phase 2 で kind/keyword フィルタ精緻化後に再有効化。
    url: https://www.pokemon-card.com/info/
    interval_sec: 600
    parser: pokemon_card_news.news_list
    enabled: false
  - id: pokeca_sokuhou_rss
    kind: feed
    # 実URLは RSS 提供元確認後に差し替え。
    url: https://pokeca-sokuhou.example/feed
    interval_sec: 180
    parser: pokeca_sokuhou.feed
    enabled: false
